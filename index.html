function drawOverlay(cv,imgs,idx,txt,sz,sty,clr,nm,logo,logoPos,flt,tl,txtOpt){
  if(!cv)return;var ctx=cv.getContext("2d"),W=sz.w,H=sz.h;cv.width=W;cv.height=H;
  ctx.fillStyle="#e8e7ef";ctx.fillRect(0,0,W,H);
  if(!flt)flt={bri:100,con:100,sat:100,warm:0,tint:0,vig:0};
  if(!txtOpt)txtOpt={size:100,color:"#ffffff",weight:900};
  var im=imgs[idx];
  if(im&&im.el&&im.el.complete&&im.el.naturalWidth>0){
    /* Apply CSS filter for brightness/contrast/saturation */
    ctx.filter="brightness("+flt.bri+"%) contrast("+flt.con+"%) saturate("+flt.sat+"%)";
    var sc=Math.max(W/im.el.naturalWidth,H/im.el.naturalHeight),iw=im.el.naturalWidth*sc,ih=im.el.naturalHeight*sc;
    ctx.drawImage(im.el,(W-iw)/2,(H-ih)/2,iw,ih);
    ctx.filter="none";

    /* Warmth overlay (orange for warm, blue for cool) */
    if(flt.warm!==0){
      ctx.globalAlpha=Math.abs(flt.warm)/100;
      ctx.fillStyle=flt.warm>0?"rgba(255,140,50,0.25)":"rgba(50,100,255,0.2)";
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
    }

    /* Brand color tint overlay */
    if(flt.tint>0){
      ctx.globalAlpha=flt.tint/100;
      ctx.fillStyle=clr;
      ctx.globalCompositeOperation="soft-light";
      ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation="source-over";
      ctx.globalAlpha=1;
    }

    /* Vignette */
    if(flt.vig>0){
      var vr=Math.max(W,H)*0.7;
      var vg=ctx.createRadialGradient(W/2,H/2,vr*0.4,W/2,H/2,vr);
      vg.addColorStop(0,"transparent");
      vg.addColorStop(1,"rgba(0,0,0,"+(flt.vig/100*0.6)+")");
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    }
  }
  else{var bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,clr+"30");bg.addColorStop(1,"#e8e7ef");ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.fillStyle="rgba(0,0,0,0.06)";ctx.font="bold "+Math.floor(W*.12)+"px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("📷",W/2,H/2);}

  /* ── ロゴ描画（鮮明・枠近く配置・自動配置対応） ── */
  if(logo&&logo.complete&&logo.naturalWidth>0){
    var lMax=W*0.24;
    var lRatio=logo.naturalWidth/logo.naturalHeight;
    var lw=Math.min(lMax,logo.naturalWidth);
    var lhh=lw/lRatio;
    if(lhh>lMax){lhh=lMax;lw=lhh*lRatio;}
    /* 枠ギリギリに配置（パディング極小） */
    var lpadEdge=Math.floor(W*0.015);
    /* 自動配置：テキスト位置に応じてロゴを反対側に配置 */
    var pos=logoPos||"auto";
    if(pos==="auto"){
      var tp=sty&&sty.pos?sty.pos:"bottom";
      if(tp==="bottom") pos="top-center";
      else if(tp==="top") pos="bottom-center";
      else if(tp==="center") pos="top-center";
      else pos="top-center"; /* full overlay */
    }
    var lx,ly;
    if(pos==="top-left"){lx=lpadEdge;ly=lpadEdge;}
    else if(pos==="top-right"){lx=W-lw-lpadEdge;ly=lpadEdge;}
    else if(pos==="top-center"){lx=(W-lw)/2;ly=lpadEdge;}
    else if(pos==="bottom-left"){lx=lpadEdge;ly=H-lhh-lpadEdge;}
    else if(pos==="bottom-right"){lx=W-lw-lpadEdge;ly=H-lhh-lpadEdge;}
    else if(pos==="bottom-center"){lx=(W-lw)/2;ly=H-lhh-lpadEdge;}
    else{lx=(W-lw)/2;ly=lpadEdge;}
    /* 高解像度中間キャンバスで鮮明に描画 */
    var hiRes=document.createElement("canvas");
    var hiS=4;
    hiRes.width=Math.ceil(lw*hiS);hiRes.height=Math.ceil(lhh*hiS);
    var hiCtx=hiRes.getContext("2d");
    hiCtx.imageSmoothingEnabled=true;
    hiCtx.imageSmoothingQuality="high";
    hiCtx.drawImage(logo,0,0,hiRes.width,hiRes.height);
    ctx.save();
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality="high";
    /* 白グロー（暗い背景でも視認性を確保） */
    ctx.shadowColor="rgba(255,255,255,0.8)";
    ctx.shadowBlur=10;
    ctx.drawImage(hiRes,lx,ly,lw,lhh);
    /* 重ねて描画でくっきり */
    ctx.shadowColor="rgba(0,0,0,0.25)";
    ctx.shadowBlur=4;
    ctx.shadowOffsetX=1;
    ctx.shadowOffsetY=1;
    ctx.drawImage(hiRes,lx,ly,lw,lhh);
    ctx.restore();

  if(!txt&&!tl)return;
  /* フォントサイズ基本値（1080px幅で約70px → SNS視認性◎） */
  var baseFsRatio=0.065*(txtOpt.size/100);
  var hasTL=tl&&tl.length>0;

  /* ── 自動フォントサイズ調整 ── */
  /* テキストが長い場合は段階的に縮小し、最大3行を目標にする */
  function calcLines(fsize,text,maxW){
    ctx.font=txtOpt.weight+" "+fsize+"px 'Noto Sans JP',sans-serif";
    var ls=[],c="";
    for(var i=0;i<text.length;i++){
      var ch=text[i];
      if(ch==="\n"){ls.push(c);c="";continue;}
      var t2=c+ch;
      if(ctx.measureText(t2).width>maxW&&c){ls.push(c);c=ch;}else c=t2;
    }
    if(c)ls.push(c);
    return ls;
  }
  /* 孤立文字の防止: 最終行が2文字以下なら前の行から文字を移動 */
  function balanceLines(ls){
    if(ls.length<2)return ls;
    var last=ls[ls.length-1];
    if(last.length<=2){
      var prev=ls[ls.length-2];
      /* 前の行の末尾から3文字を最終行に移す */
      var move=Math.min(3,Math.floor(prev.length/3));
      if(move>0){
        ls[ls.length-2]=prev.slice(0,-move);
        ls[ls.length-1]=prev.slice(-move)+last;
      }
    }
    return ls;
  }

  var pad=Math.floor(W*.06);
  var mx=W-pad*2;
  var fs=Math.max(36,Math.floor(W*baseFsRatio));
  var lines=[];
  if(txt){
    lines=calcLines(fs,txt,mx);
    /* 4行以上になったらフォントを段階的に縮小 */
    var minFs=Math.max(28,Math.floor(W*0.038));
    while(lines.length>3&&fs>minFs){
      fs=Math.max(minFs,fs-2);
      lines=calcLines(fs,txt,mx);
    }
    lines=balanceLines(lines);
  }

  var tlFs=Math.max(16,Math.floor(fs*.35));
  var tlH=hasTL?tlFs*1.8:0;
  ctx.font=txtOpt.weight+" "+fs+"px 'Noto Sans JP',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  var lh=fs*1.4,bH=lines.length*lh+pad+tlH;
  /* アウトライン太さ強化（視認性向上） */
  var ol=Math.max(4,Math.floor(fs*0.09));

  function drawTxt(x,y,txt2){
    ctx.save();
    ctx.font=txtOpt.weight+" "+fs+"px 'Noto Sans JP',sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    /* 二重アウトライン（外側暗＋内側やや暗）で文字くっきり */
    ctx.lineWidth=ol*2.5;ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineJoin="round";ctx.miterLimit=2;
    ctx.strokeText(txt2,x,y);
    ctx.lineWidth=ol*1.5;ctx.strokeStyle="rgba(0,0,0,0.8)";
    ctx.strokeText(txt2,x,y);
    ctx.fillStyle=txtOpt.color;
    ctx.fillText(txt2,x,y);
    ctx.restore();
  }
  function drawTagline(x,y){
    if(!hasTL)return;
    ctx.save();
    /* タグラインが長い場合はフォント縮小 */
    var actTlFs=tlFs;
    var tlText="— "+tl+" —";
    ctx.font="700 "+actTlFs+"px 'Noto Sans JP',sans-serif";
    while(ctx.measureText(tlText).width>W-pad*1.5&&actTlFs>12){
      actTlFs--;
      ctx.font="700 "+actTlFs+"px 'Noto Sans JP',sans-serif";
    }
    ctx.textAlign="center";ctx.textBaseline="middle";
    /* タグラインも二重アウトライン */
    ctx.lineWidth=Math.max(3,actTlFs*0.12);ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineJoin="round";
    ctx.strokeText(tlText,x,y);
    ctx.fillStyle=clr;
    ctx.shadowColor="rgba(0,0,0,0.6)";ctx.shadowBlur=8;
    ctx.fillText(tlText,x,y);
    ctx.restore();
  }

  if(sty.pos==="bottom"){
    var gy=H-bH-pad*2;
    var g=ctx.createLinearGradient(0,gy-pad*2,0,H);
    g.addColorStop(0,"transparent");g.addColorStop(0.15,"rgba(0,0,0,.3)");g.addColorStop(0.45,"rgba(0,0,0,.65)");g.addColorStop(1,"rgba(0,0,0,.92)");
    ctx.fillStyle=g;ctx.fillRect(0,gy-pad*2,W,H-gy+pad*2);
    lines.forEach(function(l,j){drawTxt(W/2,H-bH-pad/2+j*lh+lh/2+16,l);});
    var btmY=H-bH-pad/2+lines.length*lh+lh/2+16;

  }
  else if(sty.pos==="center"){
    var cy=H/2,bx=pad*1.2,bw=W-pad*2.4,bh=bH+pad*1.8,r=20;
    ctx.fillStyle="rgba(0,0,0,.72)";
    ctx.beginPath();ctx.moveTo(bx+r,cy-bh/2);ctx.lineTo(bx+bw-r,cy-bh/2);ctx.quadraticCurveTo(bx+bw,cy-bh/2,bx+bw,cy-bh/2+r);ctx.lineTo(bx+bw,cy+bh/2-r);ctx.quadraticCurveTo(bx+bw,cy+bh/2,bx+bw-r,cy+bh/2);ctx.lineTo(bx+r,cy+bh/2);ctx.quadraticCurveTo(bx,cy+bh/2,bx,cy+bh/2-r);ctx.lineTo(bx,cy-bh/2+r);ctx.quadraticCurveTo(bx,cy-bh/2,bx+r,cy-bh/2);ctx.closePath();ctx.fill();
    ctx.strokeStyle=clr+"90";ctx.lineWidth=3;ctx.stroke();
    var sy2=cy-((lines.length-1)*lh)/2-(hasTL?tlH/2:0);
    lines.forEach(function(l,j){drawTxt(W/2,sy2+j*lh,l);});
    drawTagline(W/2,sy2+lines.length*lh+tlFs*0.7);
  }
  else if(sty.pos==="top"){
    var g2=ctx.createLinearGradient(0,0,0,bH+pad*4);
    g2.addColorStop(0,"rgba(0,0,0,.92)");g2.addColorStop(0.45,"rgba(0,0,0,.65)");g2.addColorStop(0.8,"rgba(0,0,0,.3)");g2.addColorStop(1,"transparent");
    ctx.fillStyle=g2;ctx.fillRect(0,0,W,bH+pad*4);
    lines.forEach(function(l,j){drawTxt(W/2,pad+j*lh+lh/2+8,l);});
    drawTagline(W/2,pad+lines.length*lh+lh/2+8+tlFs*1.3);
  }
  else{
    ctx.fillStyle="rgba(0,0,0,.4)";ctx.fillRect(0,0,W,H);
    var sy3=H/2-((lines.length-1)*lh)/2-(hasTL?tlH/2:0);
    lines.forEach(function(l,j){drawTxt(W/2,sy3+j*lh,l);});
    drawTagline(W/2,sy3+lines.length*lh+tlFs*0.7);
  }
  ctx.shadowColor="transparent";ctx.shadowBlur=0;
}

  /* ── ロゴ白背景を自動除去 ── */
  function removeWhiteBG(img){
    var c=document.createElement("canvas");
    c.width=img.naturalWidth;c.height=img.naturalHeight;
    var cx=c.getContext("2d");
    cx.drawImage(img,0,0);
    var d=cx.getImageData(0,0,c.width,c.height);
    var px=d.data;
    for(var i=0;i<px.length;i+=4){
      var r=px[i],g=px[i+1],b=px[i+2];
      /* 純白に近い部分のみ透過（RGB各240以上） */
      if(r>240&&g>240&&b>240){
        var lum=(r+g+b)/3;
        var alpha=Math.max(0, Math.round((255-lum)*17) );
        px[i+3]=Math.min(px[i+3],alpha);
      }
      /* 白寄り（235-240）は軽く透過 */
      else if(r>235&&g>235&&b>235){
        px[i+3]=Math.min(px[i+3],120);
      }
    }
    cx.putImageData(d,0,0);
    return c.toDataURL("image/png");
  }

  function dlVideo(){
    if(images.length<2){notify("⚠ 動画には2枚以上の画像が必要です");return;}
    setDlLoading(true);setVidProg("準備中...");
    var vc=document.createElement("canvas");
    vc.width=size.w;vc.height=size.h;
    var vctx=vc.getContext("2d");
    var tmpA=document.createElement("canvas");tmpA.width=size.w;tmpA.height=size.h;
    var tmpB=document.createElement("canvas");tmpB.width=size.w;tmpB.height=size.h;
    var fps=30;
    var framesPerSlide=vidSec*fps;
    var fadeFrames=Math.min(Math.floor(fps*0.4),Math.floor(framesPerSlide/3));
    var totalFrames=images.length*framesPerSlide;
    var stream=vc.captureStream(fps);
    var mimeType="video/webm;codecs=vp9";
    if(!MediaRecorder.isTypeSupported(mimeType))mimeType="video/webm";
    var recorder=new MediaRecorder(stream,{mimeType:mimeType,videoBitsPerSecond:8000000});
    var chunks=[];
    recorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
    recorder.onstop=function(){
      var blob=new Blob(chunks,{type:"video/webm"});
      var u=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=u;a.download=brand.sn+"_slideshow_"+size.id+".webm";

      notify("🎬 動画DL完了! ("+images.length+"枚×"+vidSec+"秒)");
    };
    recorder.start();
    var frame=0;
    function renderFrame(){
      if(frame>=totalFrames){recorder.stop();return;}
      var slideIdx=Math.min(Math.floor(frame/framesPerSlide),images.length-1);
      var posInSlide=frame-slideIdx*framesPerSlide;
      if(frame%(fps*1)===0)setVidProg("🎬 "+(slideIdx+1)+"/"+images.length+"枚目");
      if(slideIdx>0&&posInSlide<fadeFrames){
        var alpha=posInSlide/fadeFrames;
        drawOverlay(tmpA,images,slideIdx-1,catchCopy,size,oStyle,bc,brand.name,logoEl,logoPos,imgFilter,brand.tagline,txtOpt);
        drawOverlay(tmpB,images,slideIdx,catchCopy,size,oStyle,bc,brand.name,logoEl,logoPos,imgFilter,brand.tagline,txtOpt);
        vctx.globalAlpha=1;
        vctx.drawImage(tmpA,0,0);
        vctx.globalAlpha=alpha;
        vctx.drawImage(tmpB,0,0);
        vctx.globalAlpha=1;
      }else{
        drawOverlay(vc,images,slideIdx,catchCopy,size,oStyle,bc,brand.name,logoEl,logoPos,imgFilter,brand.tagline,txtOpt);
      }
      frame++;
      requestAnimationFrame(renderFrame);
    }
    renderFrame();
  }

                </div>
              </div>

                    {c:"#FFD700",n:"ゴールド"},
                    {c:"#FF6B6B",n:"レッド"},
                    {c:"#4ECDC4",n:"ミント"},

              {/* Hashtag bar — improved */}
              {tags.length>0&&<div style={{marginTop:8,padding:"8px 10px",borderRadius:10,background:"rgba(0,0,0,0.02)",border:"1px solid rgba(0,0,0,0.04)"}}>

                  {tags.slice(0,25).map(function(t,i){var isBrand=t==="#"+brand.tag;return <span key={i} style={{fontSize:11,padding:"5px 10px",borderRadius:8,background:isBrand?bc+"18":"rgba(0,0,0,0.04)",color:isBrand?bc:"#666",fontWeight:isBrand?700:400,transition:"all 0.15s"}}>{t}</span>;})}

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  <button onClick={shareToX} disabled={dlLoading} className="btn-hover" style={{padding:"11px 8px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#000,#1a1a1a)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,opacity:dlLoading?.4:1,boxShadow:"0 2px 8px rgba(0,0,0,0.15)",transition:"all 0.2s"}}>𝕏 ポスト</button>
                  <button onClick={shareToFB} disabled={dlLoading} className="btn-hover" style={{padding:"11px 8px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1877F2,#0D65D9)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,opacity:dlLoading?.4:1,boxShadow:"0 2px 8px rgba(24,119,242,0.25)",transition:"all 0.2s"}}>f Facebook</button>

                <div style={{fontSize:11,color:"#aaa",marginTop:8,lineHeight:1.5,textAlign:"center"}}>モバイル: 直接共有 ／ PC: 画像DL→テキストをコピーして貼り付け</div>
              </div>
              {images.length>=2&&(
                <div style={{padding:8,borderRadius:10,background:"rgba(129,140,248,0.04)",border:"1px solid rgba(129,140,248,0.1)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#818CF8"}}>🎬 動画スライドショー</span>

      {tab==="settings"&&(
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{fontSize:20,fontWeight:800,color:"#1a1a2e",marginBottom:20}}>⚙ 設定</div>

          {/* Logo per brand */}
          <Glass glow={bc} style={{marginBottom:16,padding:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,"+bc+","+ba+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏷</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:700,color:bc}}>ブランドロゴ設定</div>
                <div style={{fontSize:12,color:"#888",marginTop:3}}>ロゴを登録すると画像に自動合成されます</div>
              </div>
              <Badge c={bc}>{logoCount}/{LOGO_GROUPS.length}</Badge>
            </div>
            <div style={{fontSize:11,color:"#999",marginBottom:14}}>PNG（透過推奨）・SVG・WebP対応 — 同ブランドの全店舗でロゴを共有します</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {LOGO_GROUPS.map(function(g){
                var lg=logos[g.id];
                var hasSrc=lg&&lg.src;
                return (<div key={g.id} style={{padding:10,borderRadius:12,border:hasSrc?"1.5px solid "+g.color+"40":"1.5px solid rgba(0,0,0,0.06)",background:hasSrc?g.color+"06":"rgba(0,0,0,0.01)",transition:"all 0.2s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                    <div style={{width:24,minWidth:24,height:24,minHeight:24,borderRadius:7,background:"linear-gradient(135deg,"+g.color+","+g.accent+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff",flexShrink:0,lineHeight:1}}>{g.name.slice(0,2)}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#444",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.name}</div>
                    </div>
                    {hasSrc&&<Badge c="#34D399" style={{fontSize:8}}>✅</Badge>}
                  </div>
                  {g.stores.length>1&&(
                    <div style={{marginBottom:6,display:"flex",gap:3,flexWrap:"wrap"}}>
                      {g.stores.map(function(s,i){return <Badge key={i} c={g.color} style={{fontSize:7,padding:"1px 5px"}}>{s}</Badge>;})}
                    </div>
                  )}
                  {hasSrc?(
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{width:52,height:52,borderRadius:8,background:"repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50% / 8px 8px",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0,border:"1px solid rgba(0,0,0,0.04)"}}>
                        <img src={lg.src} alt="" style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}}/>
                      </div>
                      <div style={{display:"flex",gap:4,flex:1,flexDirection:"column"}}>
                        <label style={{padding:"5px 0",borderRadius:7,border:"1px solid "+g.color+"30",background:"transparent",color:g.color,fontSize:9,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                          🔄 変更
                          <input type="file" accept="image/png,image/svg+xml,image/webp" onChange={function(e){if(e.target.files&&e.target.files[0])loadLogo(g.id,e.target.files[0]);e.target.value="";}} style={{display:"none"}}/>
                        </label>
                        <button onClick={function(){removeLogo(g.id);}} style={{padding:"5px 0",borderRadius:7,border:"1px solid rgba(239,68,68,0.2)",background:"transparent",color:"#F87171",fontSize:9,fontWeight:600,cursor:"pointer"}}>🗑 削除</button>
                      </div>
                    </div>
                  ):(
                    <label style={{display:"block",border:"2px dashed rgba(0,0,0,0.08)",borderRadius:10,padding:"14px 8px",textAlign:"center",cursor:"pointer"}}>
                      <div style={{fontSize:18,opacity:0.15,marginBottom:2}}>🏷</div>
                      <div style={{fontSize:9,color:"#aaa"}}>ロゴをアップロード</div>
                      <input type="file" accept="image/png,image/svg+xml,image/webp" onChange={function(e){if(e.target.files&&e.target.files[0])loadLogo(g.id,e.target.files[0]);e.target.value="";}} style={{display:"none"}}/>
                    </label>
                  )}
                </div>);
              })}
            </div>
          </Glass>

          {/* Logo position */}
          <Glass style={{marginBottom:16,padding:14}}>
            <div style={{fontSize:14,fontWeight:700,color:"#444",marginBottom:10}}>📍 ロゴ配置（全ブランド共通）</div>
            {/* 自動配置ボタン */}
            <button onClick={function(){setLogoPos("auto");}} style={{width:"100%",padding:"10px",borderRadius:10,border:logoPos==="auto"?"1.5px solid "+bc+"60":"1.5px solid rgba(0,0,0,0.08)",background:logoPos==="auto"?"linear-gradient(135deg,"+bc+"12,"+bc+"06)":"transparent",color:logoPos==="auto"?bc:"#888",fontSize:12,fontWeight:logoPos==="auto"?700:500,cursor:"pointer",transition:"all 0.15s",marginBottom:8}}>✨ 自動（テキスト配置に応じて最適位置）</button>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
              {[
                {id:"top-left",name:"↖ 左上"},
                {id:"top-center",name:"↑ 中央上"},
                {id:"top-right",name:"↗ 右上"},
                {id:"bottom-left",name:"↙ 左下"},
                {id:"bottom-center",name:"↓ 中央下"},
                {id:"bottom-right",name:"↘ 右下"},
              ].map(function(lp){var sel=logoPos===lp.id;return <button key={lp.id} onClick={function(){setLogoPos(lp.id);}} style={{padding:"10px",borderRadius:10,border:sel?"1.5px solid "+bc+"60":"1.5px solid rgba(0,0,0,0.08)",background:sel?bc+"0C":"transparent",color:sel?bc:"#888",fontSize:12,fontWeight:sel?700:500,cursor:"pointer",transition:"all 0.15s"}}>{lp.name}</button>;})}
            </div>
          </Glass>

          {/* Unsplash */}
          <Glass glow="#818CF8" style={{marginBottom:16,padding:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#818CF8,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📷</div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:700,color:"#818CF8"}}>Unsplash フリー素材API</div>
                <div style={{fontSize:12,color:"#888",marginTop:3}}>カテゴリに合った写真を自動検索・取得</div>
              </div>
              <Badge c={unsplashKey?"#34D399":"#F87171"} style={{padding:"4px 12px"}}>{unsplashKey?"✅ 設定済":"⚠ 未設定"}</Badge>
            </div>
            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>Unsplash Access Key</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="text" value={unsplashKey} onChange={function(e){setUnsplashKey(e.target.value);}} placeholder="Access Key を貼り付け" style={Object.assign({},INP,{flex:1})} />
              <a href="https://unsplash.com/developers" target="_blank" rel="noopener noreferrer" style={{padding:"12px 18px",borderRadius:12,background:"rgba(129,140,248,0.1)",color:"#818CF8",fontSize:13,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap",border:"1px solid rgba(129,140,248,0.2)"}}>🔗 APIキー取得</a>
            </div>
            <div style={{marginTop:10,padding:10,borderRadius:10,background:"rgba(129,140,248,0.05)",border:"1px solid rgba(129,140,248,0.08)",fontSize:13,color:"#666",lineHeight:2}}>
              <strong style={{color:"#818CF8"}}>取得手順:</strong><br/>
              1. <a href="https://unsplash.com/developers" target="_blank" rel="noopener noreferrer" style={{color:"#818CF8",fontWeight:700}}>unsplash.com/developers</a> にアクセス<br/>
              2. 無料アカウント作成 → 「New Application」<br/>
              3. 「Access Key」をコピーして上に貼り付け<br/>
              ※ 無料で50リクエスト/時間
            </div>
          </Glass>
        </div>
      )}

      {/* ════ GUIDE — 使い方 ════ */}
      {tab==="guide"&&(
        <div style={{maxWidth:800,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
            <div style={{width:48,height:48,borderRadius:16,background:"linear-gradient(135deg,"+bc+","+ba+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"#fff",boxShadow:"0 4px 16px "+bc+"30"}}>❓</div>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:"#1a1a2e",letterSpacing:-.5}}>使い方ガイド</div>
              <div style={{fontSize:13,color:"#888",marginTop:2}}>SNS Post Composerの基本操作を確認できます</div>
            </div>
          </div>

          {/* ステップ一覧 */}
          {[
            {step:"1",icon:"🏢",title:"ブランド / 店舗を選ぶ",color:"#E8A0BF",
             desc:"左パネルからブランドまたは店舗を選択します。選択すると、カラーテーマやタグラインが自動で反映されます。",
             tips:["HC Lucina本部と各直営店は同じロゴを共有します","ピラティス系ブランド（CPS・清澄白河）も選べます"]},
            {step:"2",icon:"📂",title:"カテゴリを選ぶ",color:"#F5A623",
             desc:"投稿に関連するレッスンやサービスを選択します。Unsplashのフリー素材検索にも使われます。",
             tips:["選んだカテゴリに合ったハッシュタグがAI生成に反映されます"]},
            {step:"3",icon:"🎯",title:"目的 & ターゲットを設定",color:"#3B82F6",
             desc:"「集客・宣伝」「認知拡大」などの目的と、「20代女性」「初心者」などのターゲット層を選びます。AIが文体やトーンを自動で最適化します。",
             tips:["目的＝キャッチコピーの方向性","ターゲット＝キャプションの文体"]},
            {step:"4",icon:"💎",title:"強み・USPを選択",color:"#8B5CF6",
             desc:"投稿で訴求したい店舗の強みをチェックします。選択した強みがAI生成のキャッチコピーとキャプションに反映されます。",
             tips:["3つ程度が推奨（多すぎると焦点がぼやけます）","全選択/全解除ボタンで一括操作OK"]},
            {step:"5",icon:"🪄",title:"AI一括生成",color:"#1a1a2e",
             desc:"左パネル下部の「AI一括生成」ボタンでキャッチコピー＋キャプション＋ハッシュタグを自動生成します。各項目を変更すると自動で再生成もされます。",
             tips:["キャッチコピー・キャプションそれぞれ個別に「別の案を生成」も可能","手動編集ももちろんOK"]},
            {step:"6",icon:"🖼",title:"画像をアップロード",color:"#10B981",
             desc:"中央パネルの「➕追加」ボタンで画像をアップロード。複数枚もOKです。「📷 フリー素材」でUnsplashから検索・追加もできます。",
             tips:["2枚以上で動画スライドショー(WebM)の書き出しが可能","画像はドット付きナビで切り替え"]},
            {step:"7",icon:"📐",title:"サイズ & 配置を設定",color:"#F59E0B",
             desc:"正方形（フィード）・縦長4:5・リール・ストーリー・横長から選択。テキストオーバーレイの配置（下部/中央/上部/全面）も設定します。",
             tips:["Instagramフィードには「縦長4:5」が推奨","リール・ストーリーは「9:16」"]},
            {step:"8",icon:"🔤",title:"テキストスタイルを調整",color:"#E8A0BF",
             desc:"キャッチコピーの文字サイズ（50%〜200%）、文字色（プリセット7色＋カスタム）、文字太さ（Regular〜Extra Bold）をリアルタイムプレビューで調整します。",
             tips:["「リセット」ボタンで初期値（白・Extra Bold・100%）に戻せます","暗い背景には白、明るい背景には黒がおすすめ"]},
            {step:"9",icon:"🎨",title:"画像フィルタを適用",color:"#818CF8",
             desc:"「ブランド統一」「ウォーム」「クール」など8種類のフィルタプリセットから選んで、投稿画像のトーンを統一できます。",
             tips:["ブランドカラーのティントやビネットも自動調整","「オリジナル」でフィルタなしに"]},
            {step:"10",icon:"📥",title:"エクスポート & 共有",color:"#EF4444",
             desc:"右パネル下部から画像DL・全枚DL・動画DL・SNS共有ができます。画像DL時にキャプション全文が自動コピーされるので、そのままSNSに貼り付けるだけ！",
             tips:["𝕏・Facebookの共有ボタンで直接投稿画面へ","「📋 文章コピー」でテキストだけコピーも可能","モバイルではWeb Share APIで直接共有"]},
          ].map(function(s){
            return <Glass key={s.step} glow={s.color+"40"} style={{marginBottom:12,padding:16}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
                <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,"+s.color+","+s.color+"CC)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#fff",boxShadow:"0 3px 12px "+s.color+"25",flexShrink:0}}>
                  {s.icon}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6}}>
                    <Badge c={s.color} style={{fontSize:10,padding:"2px 8px"}}>STEP {s.step}</Badge>
                    <span style={{fontSize:16,fontWeight:700,color:"#1a1a2e"}}>{s.title}</span>
                  </div>
                  <div style={{fontSize:13,color:"#555",lineHeight:1.8,marginBottom:s.tips.length>0?10:0}}>{s.desc}</div>
                  {s.tips.length>0&&<div style={{padding:"8px 12px",borderRadius:10,background:"rgba(0,0,0,0.02)",border:"1px solid rgba(0,0,0,0.04)"}}>
                    {s.tips.map(function(t,i){return <div key={i} style={{fontSize:12,color:"#888",lineHeight:1.8,display:"flex",alignItems:"flex-start",gap:6}}>
                      <span style={{color:s.color,flexShrink:0,fontSize:10,marginTop:3}}>💡</span>{t}
                    </div>;})}
                  </div>}
                </div>
              </div>
            </Glass>;
          })}

          {/* 設定セクション */}
          <Glass glow="#818CF8" style={{marginBottom:12,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#818CF8,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#fff",boxShadow:"0 3px 12px rgba(129,140,248,0.25)"}}>⚙</div>
              <div style={{fontSize:16,fontWeight:700,color:"#1a1a2e"}}>設定タブについて</div>
            </div>
            <div style={{fontSize:13,color:"#555",lineHeight:1.8}}>
              「⚙ 設定」タブでは以下の設定ができます：
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
              {[
                {icon:"🏷",title:"ブランドロゴ",desc:"PNG/SVG/WebPでロゴを登録。白背景は自動除去されます。同ブランドの全店舗で共有。"},
                {icon:"📍",title:"ロゴ配置",desc:"画像上のロゴの位置を6箇所（左上/中央上/右上/左下/中央下/右下）から選択。"},
                {icon:"📷",title:"Unsplash API",desc:"フリー素材検索のAPIキーを設定。無料で50リクエスト/時間。"},
              ].map(function(x,i){return <div key={i} style={{padding:12,borderRadius:12,background:"rgba(129,140,248,0.04)",border:"1px solid rgba(129,140,248,0.08)"}}>
                <div style={{fontSize:18,marginBottom:4}}>{x.icon}</div>
                <div style={{fontSize:13,fontWeight:700,color:"#444",marginBottom:4}}>{x.title}</div>
                <div style={{fontSize:12,color:"#888",lineHeight:1.6}}>{x.desc}</div>
              </div>;})}
            </div>
          </Glass>

          {/* クイックスタート */}
          <Glass glow="#34D399" style={{marginBottom:12,padding:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#34D399,#10B981)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"#fff",boxShadow:"0 3px 12px rgba(52,211,153,0.25)"}}>🚀</div>
              <div style={{fontSize:16,fontWeight:700,color:"#1a1a2e"}}>最短フロー（3ステップ）</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              {[
                {n:"1",t:"ブランド＋カテゴリ選択",sub:"左パネル"},
                {n:"2",t:"AI一括生成ボタン",sub:"左パネル下部"},
                {n:"3",t:"画像追加 → DL",sub:"中央＋右パネル"},
              ].map(function(x){return <div key={x.n} style={{flex:1,padding:14,borderRadius:14,background:"linear-gradient(135deg,rgba(52,211,153,0.06),rgba(16,185,129,0.03))",border:"1px solid rgba(52,211,153,0.15)",textAlign:"center"}}>
                <div style={{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#34D399,#10B981)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff",marginBottom:6}}>{x.n}</div>
                <div style={{fontSize:13,fontWeight:700,color:"#333",lineHeight:1.4}}>{x.t}</div>
                <div style={{fontSize:11,color:"#aaa",marginTop:3}}>{x.sub}</div>
              </div>;})}
            </div>
          </Glass>

          <div style={{textAlign:"center",marginTop:16,marginBottom:32}}>
            <Btn c={bc} c2={ba} onClick={function(){setTab("create");}} style={{padding:"14px 40px",fontSize:14,borderRadius:14}}>✏ 作成画面へ</Btn>
          </div>
        </div>
      )}

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
